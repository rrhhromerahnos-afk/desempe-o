  for(let i=0;i<3;i++){
    const fo=f.fortalezas[i];
    db[`fortaleza_${i+1}`]=(fo&&(fo.f||fo.e))?`${fo.f||'—'} | Ejemplo: ${fo.e||'—'}`:null;
  }
  for(let i=0;i<3;i++){
    const a=f.areas[i];
    db[`area_mejora_${i+1}`]=(a&&(a.b||a.s||a.i))?`${a.b||'—'} | Situación: ${a.s||'—'} | Impacto: ${a.i||'—'}`:null;
  }
  for(let i=0;i<3;i++){
    const c=f.compromisos[i];
    db[`compromiso_${i+1}`]=(c&&(c.c||c.q||c.p||c.m))?`${c.c||'—'} | Quién: ${c.q||'—'} | Plazo: ${c.p||'—'} | Medición: ${c.m||'—'}`:null;
  }
  return db;
}

function dbToForm(db){
  const rd=getRD(db.role_id);
  const indicadores=rd.inds.map((_,i)=>{
    const v=db[`indicador_${i+1}`]||'';
    const m=v.match(/ \| Mín: (.+?) \| Obj: (.+)$/);
    return {minimo:m?m[1].replace('—',''):'',objetivo:m?m[2].replace('—',''):''};
  });
  const competencias=rd.comps.map((_,i)=>{
    const v=db[`competencia_${i+1}`]||'';
    const cm=v.match(/ \| Cal: ([A-D])/),om=v.match(/ \| Obs: (.+)$/);
    return {cal:cm?cm[1]:'',obs:om?om[1]:''};
  });
  const fortalezas=[0,1,2].map(i=>{
    const v=db[`fortaleza_${i+1}`]||'',p=v.split(' | Ejemplo: ');
    return {f:p[0]==='—'?'':p[0]||'',e:p[1]==='—'?'':p[1]||''};
  });
  const areas=[0,1,2].map(i=>{
    const v=db[`area_mejora_${i+1}`]||'',b=v.split(' | Situación: '),s=b[1]?b[1].split(' | Impacto: '):['',''];
    return {b:b[0]==='—'?'':b[0]||'',s:s[0]==='—'?'':s[0]||'',i:s[1]==='—'?'':s[1]||''};
  });
  const compromisos=[0,1,2].map(i=>{
    const v=db[`compromiso_${i+1}`]||'';
    const c=v.split(' | Quién: ')[0],qm=v.match(/ \| Quién: (.+?) \| Plazo:/);
    const pm=v.match(/ \| Plazo: (.+?) \| Medición:/),mm=v.match(/ \| Medición: (.+)$/);
    return {c:c==='—'?'':c||'',q:qm?qm[1].replace('—',''):'',p:pm?pm[1].replace('—',''):'',m:mm?mm[1].replace('—',''):''};
  });
  return {...db,indicadores,competencias,fortalezas,areas,compromisos};
}

function toast(msg, err=false){
  const el=document.getElementById('toast');
  el.textContent=msg; el.style.background=err?'#c53030':'#112247';
  el.style.display='block'; setTimeout(()=>el.style.display='none',3000);
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function validate(s,f){
  const rd=getRD(f.role_id);
  if(s===0){
    if(!f.apellido_nombre.trim()) return 'Completá el apellido y nombre';
    if(!f.fecha) return 'Seleccioná la fecha';
    if(!f.sucursal.trim()) return 'Completá la sucursal';
    if(!f.lider_evaluador.trim()) return 'Completá el líder evaluador';
  }
  if(s===1) for(let i=0;i<f.indicadores.length;i++){
    if(!f.indicadores[i].minimo.trim()) return `Indicador ${i+1}: completá el mínimo necesario`;
    if(!f.indicadores[i].objetivo.trim()) return `Indicador ${i+1}: completá el objetivo deseable`;
  }
  if(s===2) for(let i=0;i<f.competencias.length;i++){
    if(!f.competencias[i].cal) return `Calificá la competencia: "${rd.comps[i]?.nombre}"`;
  }
  if(s===3){
    if(!f.fortalezas.some(x=>x.f.trim()&&x.e.trim())) return 'Ingresá al menos una fortaleza con ejemplo concreto';
    if(!f.areas.some(x=>x.b.trim()&&x.s.trim()&&x.i.trim())) return 'Ingresá al menos un área de mejora completa';
  }
  if(s===4) if(!f.compromisos.some(x=>x.c.trim()&&x.q.trim()&&x.p.trim()&&x.m.trim())) return 'Ingresá al menos un compromiso completo';
  return null;
}

// ─── AUTH ─────────────────────────────────────────────────────────────────
function getAreasPermitidas(){
  if(!currentPerfil||currentPerfil.is_admin) return AREAS;
  const permitidos=currentPerfil.roles_permitidos||[];
  return AREAS.map(a=>({
    ...a,
    roles:a.roles.map(r=>({...r, active:r.active&&permitidos.includes(r.id)}))
  })).filter(a=>a.roles.some(r=>r.active));
}

async function checkAuth(){
  const {data:{session}}=await sb.auth.getSession();
  if(session){
    currentUser=session.user;
    await fetchPerfil();
  } else {
    view='login'; render();
  }
}

async function fetchPerfil(){
  const {data,error}=await sb.from('perfiles').select('*').eq('id',currentUser.id).single();
  if(error||!data){
    toast('Tu usuario no tiene perfil asignado. Contactá a RRHH.',true);
    await sb.auth.signOut(); view='login'; render(); return;
  }
  currentPerfil=data;
  const areas=getAreasPermitidas();
  const todosRoles=areas.flatMap(a=>a.roles).filter(r=>r.active);
  if(!currentPerfil.is_admin&&todosRoles.length===1){
    const r=todosRoles[0];
    const a=areas.find(ar=>ar.roles.some(ro=>ro.id===r.id));
    curArea=a; curRole=r;
    await loadForms(r); view='list';
  } else {
    view='home';
  }
  render();
}

async function doLogin(){
  const email=document.getElementById('login-email')?.value?.trim();
  const pass=document.getElementById('login-pass')?.value;
  const errEl=document.getElementById('login-error');
  if(!email||!pass){ errEl.textContent='Completá email y contraseña.'; errEl.style.display='block'; return; }
  const btn=document.getElementById('btn-login');
  btn.disabled=true; btn.textContent='Ingresando...';
  const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){
    errEl.textContent='Email o contraseña incorrectos.'; errEl.style.display='block';
    btn.disabled=false; btn.textContent='Ingresar'; return;
  }
  currentUser=data.user;
  await fetchPerfil();
}

async function doLogout(){
  await sb.auth.signOut();
  currentUser=null; currentPerfil=null;
  view='login'; forms=[]; form=null; curArea=null; curRole=null;
  render();
}

async function loadForms(role){
  loading=true; forms=[]; render();
  const {data}=await sb.from('planillas').select('*').eq('role_id',role.id).order('created_at',{ascending:false});
  forms=(data||[]).map(dbToForm);
  loading=false; render();
}

async function saveForm(f,newStatus){
  saving=true; render();
  const fToSave={...f,status:newStatus||f.status,updated_at:new Date().toISOString()};
  const {error}=await sb.from('planillas').upsert(formToDb(fToSave));
  if(error){ toast('Error al guardar',true); }
  else { form=fToSave; toast(newStatus==='Completada'?'Planilla completada ✓':'Guardado ✓'); }
  if(curRole) await loadForms(curRole);
  saving=false; render();
  return fToSave;
}

async function delForm(id){
  await sb.from('planillas').delete().eq('id',id);
  confirmDelId=null; await loadForms(curRole);
}

  const showHome=currentPerfil?.is_admin||(currentPerfil?.roles_permitidos||[]).length>1;
  const crumbs=showHome
    ?`<button class="crumb-btn" data-nav="home">Inicio</button><span class="crumb-sep">›</span><button class="crumb-btn" data-nav="area">${curArea?.label}</button><span class="crumb-sep">›</span><span class="crumb-cur">${curRole.label}${curRole.sub?' · '+curRole.sub:''}</span>`
    :`<span class="crumb-cur">${curRole.label}${curRole.sub?' · '+curRole.sub:''}</span>`;
  return `
    <div class="topbar">
      <div class="topbar-left">${crumbs}</div>
      <div class="topbar-right">${buildTopbarRight(`<button class="btn btn-primary" data-action="nueva">+ Nueva Planilla</button>`)}</div>
    </div>
    <div class="page-wide">${content}</div>`;
}

// ── FORM ──────────────────────────────────────────────────────────────────
function buildForm(){
  const rd=getRD(form.role_id);
  const steps=STEPS.map((sl,i)=>{
    const cls=step===i?'step-active':i<step?'step-done':'step-pending';
    return `<button class="step-btn ${cls}" data-step="${i}">${i<step?'✓ ':''}${i+1}. ${sl}</button>`;
  }).join('');
  let body='';
  if(step===0) body=buildStep0(rd);
  if(step===1) body=buildStep1(rd);
  if(step===2) body=buildStep2(rd);
  if(step===3) body=buildStep3();
  if(step===4) body=buildStep4();
  const navRight=step<4
    ?`<button class="btn btn-primary" data-action="next">Siguiente →</button>`
    :`<div style="display:flex;gap:10px"><button class="btn btn-outline" data-action="finish-preview">Ver planilla completa</button><button class="btn btn-primary" data-action="finish">Finalizar ✓</button></div>`;
  return `
    <div class="topbar">
      <div class="topbar-left">
        <button class="crumb-btn" data-nav="area">${curArea?.label}</button>
        <span class="crumb-sep">›</span>
        <button class="crumb-btn" data-nav="list">${curRole?.label}</button>
        <span class="crumb-sep">›</span>
        <span class="crumb-cur">${esc(form.apellido_nombre||'Nueva planilla')}</span>
      </div>
      <div class="topbar-right">${buildTopbarRight(`<button class="btn btn-white-outline" data-action="save-draft" ${saving?'disabled':''}>${saving?'Guardando...':'💾 Guardar borrador'}</button>`)}</div>
    </div>
    <div class="steps-bar">${steps}</div>
    <div style="max-width:820px;margin:24px auto;padding:0 16px">
      ${body}
      <div style="display:flex;justify-content:space-between;padding-bottom:40px;margin-top:8px">
        <button class="btn btn-ghost" data-action="prev">← ${step>0?'Anterior':'Cancelar'}</button>
        ${navRight}
      </div>
    </div>`;
}

function buildStep0(rd){
  return `<div class="card">
    <div class="sec-title">1. Datos del encuentro</div>
    <div class="grid-2">
      <div class="fld"><label>Apellido y nombre<span class="req">*</span></label><input class="inp" data-field="apellido_nombre" value="${esc(form.apellido_nombre)}" placeholder="Ej: García, Martín"></div>
      <div class="fld"><label>Fecha<span class="req">*</span></label><input type="date" class="inp" data-field="fecha" value="${form.fecha}"></div>
      <div class="fld"><label>Sucursal<span class="req">*</span></label><input class="inp" data-field="sucursal" value="${esc(form.sucursal)}" placeholder="Nombre de la sucursal"></div>
      <div class="fld"><label>Líder evaluador<span class="req">*</span></label><input class="inp" data-field="lider_evaluador" value="${esc(form.lider_evaluador)}" placeholder="Nombre del líder"></div>
    </div>
    <div class="info-box"><strong>Puesto:</strong> ${rd.puesto} &nbsp;·&nbsp; <strong>Puesto del líder:</strong> ${rd.liderLabel}</div>
  </div>`;
}

function buildStep1(rd){
  const cards=rd.inds.map((ind,i)=>`
    <div class="ind-card">
      <div class="ind-header"><span class="ind-num">#${ind.n}</span><span class="ind-nombre">${ind.nombre}</span><span class="ind-peso">Peso: ${ind.peso}</span></div>
      <div class="ind-formula">${ind.formula}</div>
      <div class="ind-nota">${ind.nota}</div>
      <div class="grid-2">
        <div class="fld"><label>Mínimo necesario<span class="req">*</span></label><input class="inp" data-arr="indicadores" data-idx="${i}" data-key="minimo" value="${esc(form.indicadores[i]?.minimo||'')}" placeholder="Ej: 50%"></div>
        <div class="fld"><label>Objetivo deseable<span class="req">*</span></label><input class="inp" data-arr="indicadores" data-idx="${i}" data-key="objetivo" value="${esc(form.indicadores[i]?.objetivo||'')}" placeholder="Ej: 80%"></div>
      </div>
    </div>`).join('');
  return `<div class="card"><div class="sec-title">2. Indicadores de desempeño</div><p style="font-size:12px;color:#666;margin:0 0 16px">Los pesos fueron definidos por el área. Completá el mínimo necesario y el objetivo deseable según la sucursal.</p>${cards}</div>`;
}

function buildStep2(rd){
  const cards=rd.comps.map((comp,i)=>{
    const cal=form.competencias[i]?.cal||'';
    const calBtns=['A','B','C','D'].map(o=>`<button class="cal-btn${cal===o?' selected':''}" data-cal="${o}" data-comp="${i}">${o}</button>`).join('');
    return `<div class="comp-card${!cal?' sin-cal':''}">
      <div class="comp-nombre">${comp.nombre}</div><div class="comp-nivel">${comp.nivel}</div>
      <ul class="comp-items">${comp.items.map(it=>`<li>${it}</li>`).join('')}</ul>
      <div style="display:grid;grid-template-columns:auto 1fr;gap:16px;align-items:flex-start">
        <div>
          <div style="font-size:11px;font-weight:700;color:#112247;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Calificación <span class="req">*</span></div>
          <div class="cal-btns">${calBtns}</div>
          ${!cal?'<div class="cal-req">Requerido</div>':''}
        </div>
        <div class="fld"><label>Observaciones</label><textarea class="inp" data-arr="competencias" data-idx="${i}" data-key="obs" rows="3" placeholder="Comportamientos observados, ejemplos concretos...">${esc(form.competencias[i]?.obs||'')}</textarea></div>
      </div>
    </div>`;
  }).join('');
  return `<div class="card"><div class="sec-title">3. Evaluación de competencias</div><div class="info-box"><strong>Escala:</strong>&nbsp; A — Supera el nivel esperado &nbsp;·&nbsp; B — Cumple &nbsp;·&nbsp; C — En desarrollo &nbsp;·&nbsp; D — Brecha crítica</div>${cards}</div>`;
}

function buildStep3(){
  const fRows=form.fortalezas.map((f,i)=>`
    <div class="synth-row">
      <div class="synth-label">Fortaleza ${i+1}${i===0?'<span class="req"> *</span>':''}</div>
      <div class="grid-2">
        <div class="fld"><label>Fortaleza</label><input class="inp" data-arr="fortalezas" data-idx="${i}" data-key="f" value="${esc(f.f)}" placeholder="Describí la fortaleza"></div>
        <div class="fld"><label>Ejemplo concreto</label><input class="inp" data-arr="fortalezas" data-idx="${i}" data-key="e" value="${esc(f.e)}" placeholder="Situación o evidencia observable"></div>
      </div>
    </div>`).join('');
  const aRows=form.areas.map((a,i)=>`
    <div class="synth-row">
      <div class="synth-label">Área de mejora ${i+1}${i===0?'<span class="req"> *</span>':''}</div>
      <div class="grid-3">
        <div class="fld"><label>Brecha / Área</label><input class="inp" data-arr="areas" data-idx="${i}" data-key="b" value="${esc(a.b)}" placeholder="Qué área"></div>
        <div class="fld"><label>Situación observada</label><input class="inp" data-arr="areas" data-idx="${i}" data-key="s" value="${esc(a.s)}" placeholder="Qué se observó"></div>
        <div class="fld"><label>Impacto</label><input class="inp" data-arr="areas" data-idx="${i}" data-key="i" value="${esc(a.i)}" placeholder="Consecuencia o efecto"></div>
      </div>
    </div>`).join('');
  return `
    <div class="card"><div class="sec-title">4a. Fortalezas observadas en el período</div><p style="font-size:12px;color:#666;margin:0 0 14px">Al menos 1 completa, hasta 3.</p>${fRows}</div>
    <div class="card"><div class="sec-title">4b. Áreas de mejora</div><p style="font-size:12px;color:#666;margin:0 0 14px">Al menos 1 completa, hasta 3.</p>${aRows}</div>`;
}

function buildStep4(){
  const rows=form.compromisos.map((c,i)=>`
    <div class="synth-row">
      <div class="synth-label">Compromiso ${i+1}${i===0?'<span class="req"> *</span>':''}</div>
      <div class="fld"><label>Compromiso / Acción de mejora</label><input class="inp" data-arr="compromisos" data-idx="${i}" data-key="c" value="${esc(c.c)}" placeholder="Describí el compromiso concreto"></div>
      <div class="grid-2">
        <div class="fld"><label>Quién es responsable</label><input class="inp" data-arr="compromisos" data-idx="${i}" data-key="q" value="${esc(c.q)}" placeholder="Colaborador / Líder / Ambos"></div>
        <div class="fld"><label>Plazo</label><input class="inp" data-arr="compromisos" data-idx="${i}" data-key="p" value="${esc(c.p)}" placeholder="Ej: Ago 2026"></div>
      </div>
      <div class="fld"><label>¿Cómo se va a medir o evidenciar?</label><input class="inp" data-arr="compromisos" data-idx="${i}" data-key="m" value="${esc(c.m)}" placeholder="Ej: Registro en sistema, informe mensual..."></div>
    </div>`).join('');
  return `<div class="card"><div class="sec-title">5. Compromisos para el segundo semestre</div><p style="font-size:12px;color:#666;margin:0 0 16px">Al menos 1 compromiso completo, hasta 3.</p>${rows}<div class="warn-box" style="margin-top:8px">Al firmar, el/la colaborador/a confirma haber recibido y comprendido los indicadores y competencias que guiarán la evaluación de fin de año.</div></div>`;
}

// ── PREVIEW ───────────────────────────────────────────────────────────────
function buildPreview(){
  const rd=getRD(form.role_id);
  const dataGrid=[['Apellido y nombre',form.apellido_nombre],['Fecha',form.fecha],['Puesto',rd.puesto],['Sucursal',form.sucursal],['Líder evaluador',form.lider_evaluador],['Puesto del líder',rd.liderLabel]]
    .map(([k,v])=>`<div><div class="preview-data-key">${k}</div><div class="preview-data-val">${esc(v)||'—'}</div></div>`).join('');
  const indRows=rd.inds.map((ind,i)=>`<tr><td class="center"><strong style="color:#112247">${ind.n}</strong></td><td><div style="font-weight:600">${ind.nombre}</div><div style="font-size:11px;color:#888;margin-top:2px">${ind.formula}</div><div style="font-size:11px;color:#bbb">${ind.nota}</div></td><td class="center"><strong style="color:#112247">${ind.peso}</strong></td><td class="center">${esc(form.indicadores[i]?.minimo)||'—'}</td><td class="center">${esc(form.indicadores[i]?.objetivo)||'—'}</td></tr>`).join('');
  const compBlocks=rd.comps.map((comp,i)=>{
    const cal=form.competencias[i]?.cal||'', obs=form.competencias[i]?.obs||'';
    return `<div style="border:1px solid #dde2ec;border-radius:8px;padding:14px 16px;margin-bottom:10px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><div><span style="font-weight:700;font-size:14px;color:#112247">${comp.nombre}</span><span style="font-size:11px;color:#888;margin-left:10px">${comp.nivel}</span></div>${cal?`<span class="cal-badge cal-${cal}">${cal}</span>`:'<span style="font-size:12px;color:#ccc">sin calificar</span>'}</div>${obs?`<div class="obs-box"><strong style="color:#888">Observaciones: </strong>${esc(obs)}</div>`:''}</div>`;
  }).join('');
  const fortRows=form.fortalezas.map(f=>`<tr><td>${esc(f.f)||'—'}</td><td>${esc(f.e)||'—'}</td></tr>`).join('');
  const areaRows=form.areas.map(a=>`<tr><td>${esc(a.b)||'—'}</td><td>${esc(a.s)||'—'}</td><td>${esc(a.i)||'—'}</td></tr>`).join('');
  const comprRows=form.compromisos.map((c,i)=>`<tr><td class="center"><strong style="color:#112247">${i+1}</strong></td><td>${esc(c.c)||'—'}</td><td>${esc(c.q)||'—'}</td><td>${esc(c.p)||'—'}</td><td>${esc(c.m)||'—'}</td></tr>`).join('');
  return `
    <div style="background:#112247;padding:0 24px;display:flex;align-items:center;justify-content:space-between;min-height:56px">
      <div style="display:flex;align-items:center;gap:16px">
        <button data-nav="list" style="background:rgba(255,255,255,.12);border:none;color:white;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600">← Volver</button>
        <span style="color:rgba(255,255,255,.65);font-size:13px">${rd.puesto} · ${esc(form.apellido_nombre)}</span>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px">
          <button class="btn btn-primary" data-action="print" style="font-size:12px">📄 Descargar para imprimir</button>
          <span style="font-size:10px;color:rgba(255,255,255,.45)">Abrí el archivo → Ctrl+P para PDF</span>
        </div>
        <button class="btn-logout" data-action="logout">Salir</button>
      </div>
    </div>
    <div style="max-width:820px;margin:28px auto;padding:0 16px 48px">
      <div class="preview-header">
        <div style="font-size:11px;opacity:.5;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Romera Hnos. S.A. · RRHH | Revisión Inicial de Desempeño · Versión 00</div>
        <div style="font-size:21px;font-weight:900">Planilla de Revisión de Desempeño</div>
        <div style="font-size:13px;opacity:.75;margin-top:5px">${rd.puesto} · Revisión inicial y comunicación de parámetros · 2026</div>
      </div>
      <div class="preview-sub">Esta instancia tiene dos propósitos: (1) comunicar los indicadores de desempeño y las competencias que guiarán la evaluación de fin de año, y (2) ofrecer una primera devolución sobre fortalezas y áreas de mejora. El documento queda como registro firmado del acuerdo.</div>
      <div class="preview-section"><div class="sec-title">1. Datos del encuentro</div><div class="preview-data-grid">${dataGrid}</div></div>
      <div class="preview-section"><div class="sec-title">2. Indicadores de desempeño</div><table class="preview-table"><thead><tr><th class="center">#</th><th>Indicador y fórmula</th><th class="center">Peso</th><th class="center">Mínimo necesario</th><th class="center">Objetivo deseable</th></tr></thead><tbody>${indRows}</tbody></table></div>
      <div class="preview-section"><div class="sec-title">3. Evaluación de competencias</div><div class="info-box"><strong>Escala:</strong> A — Supera · B — Cumple · C — En desarrollo · D — Brecha crítica</div>${compBlocks}</div>
      <div class="preview-section"><div class="sec-title">4. Síntesis del encuentro</div><div style="font-weight:600;font-size:13px;margin-bottom:10px;color:#333">Fortalezas observadas en el período</div><table class="preview-table" style="margin-bottom:20px"><thead><tr><th>Fortaleza</th><th>Ejemplo concreto del período</th></tr></thead><tbody>${fortRows}</tbody></table><div style="font-weight:600;font-size:13px;margin-bottom:10px;color:#333">Áreas de mejora</div><table class="preview-table"><thead><tr><th>Brecha / Área</th><th>Situación observada</th><th>Impacto</th></tr></thead><tbody>${areaRows}</tbody></table></div>
      <div class="preview-section"><div class="sec-title">5. Compromisos para el segundo semestre</div><table class="preview-table"><thead><tr><th class="center">#</th><th>Compromiso</th><th>Quién</th><th>Plazo</th><th>Cómo se mide</th></tr></thead><tbody>${comprRows}</tbody></table></div>
      <div class="preview-section"><div style="font-size:12px;color:#666;margin-bottom:28px;font-style:italic">Al firmar, el/la colaborador/a confirma haber recibido y comprendido los indicadores y competencias que guiarán su evaluación de fin de año.</div><div class="sig-grid">${['Colaborador/a','Líder evaluador','Recursos Humanos'].map(s=>`<div><div class="sig-line"></div><div style="font-size:12px;font-weight:700">${s}</div><div style="font-size:11px;color:#888;margin-top:3px">Nombre y firma</div><div style="font-size:11px;color:#aaa;margin-top:2px">Fecha: ___________</div></div>`).join('')}</div></div>
    </div>`;
}

// ─── EVENTOS ──────────────────────────────────────────────────────────────
function attachEvents(){
  // Login
  const btnLogin=document.getElementById('btn-login');
  if(btnLogin){
    btnLogin.addEventListener('click', doLogin);
    document.getElementById('login-pass')?.addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
  }

  // Logout
  document.querySelectorAll('[data-action="logout"]').forEach(el=>el.addEventListener('click', doLogout));

  // Navegación
  document.querySelectorAll('[data-nav]').forEach(el=>{
    el.addEventListener('click',()=>{
      const t=el.dataset.nav;
      if(t==='home'){ view='home'; render(); }
      if(t==='area'){ view='area'; render(); }
      if(t==='list'){ view='list'; render(); }
    });
  });

  // Home: áreas
  document.querySelectorAll('.area-card:not(.disabled)').forEach(el=>{
    el.addEventListener('click',()=>{
      const a=AREAS.find(x=>x.id===el.dataset.area);
      if(a){ curArea=a; view='area'; render(); }
    });
  });

  // Area: roles
  document.querySelectorAll('.role-card:not(.disabled)').forEach(el=>{
    el.addEventListener('click',()=>{
      const r=AREAS.flatMap(a=>a.roles).find(x=>x.id===el.dataset.role);
      const a=AREAS.find(ar=>ar.roles.some(ro=>ro.id===el.dataset.role));
      if(r){ curArea=a; curRole=r; loadForms(r); view='list'; render(); }
    });
  });

  // List actions
  const qa=a=>document.querySelector(`[data-action="${a}"]`);
  const qas=a=>document.querySelectorAll(`[data-action="${a}"]`);
  qas('nueva').forEach(el=>el.addEventListener('click',()=>{ form=mkForm(curRole.id); step=0; view='form'; render(); }));
  qas('edit').forEach(el=>el.addEventListener('click',()=>{ const f=forms.find(x=>x.id===el.dataset.id); if(f){ form={...f}; step=0; view='form'; render(); }}));
  qas('ver').forEach(el=>el.addEventListener('click',()=>{ const f=forms.find(x=>x.id===el.dataset.id); if(f){ form={...f}; view='preview'; render(); }}));
  qas('del-ask').forEach(el=>el.addEventListener('click',()=>{ confirmDelId=el.dataset.id; render(); }));
  qas('del-cancel').forEach(el=>el.addEventListener('click',()=>{ confirmDelId=null; render(); }));
  qas('del-confirm').forEach(el=>el.addEventListener('click',()=>delForm(el.dataset.id)));

  // Form: campos
  document.querySelectorAll('[data-field]').forEach(el=>el.addEventListener('input',()=>{ form[el.dataset.field]=el.value; }));
  document.querySelectorAll('[data-arr]').forEach(el=>el.addEventListener('input',()=>{
    const arr=[...form[el.dataset.arr]]; arr[el.dataset.idx]={...arr[el.dataset.idx],[el.dataset.key]:el.value}; form[el.dataset.arr]=arr;
  }));
  document.querySelectorAll('[data-cal]').forEach(el=>el.addEventListener('click',()=>{
    const i=parseInt(el.dataset.comp), arr=[...form.competencias];
    arr[i]={...arr[i], cal:arr[i].cal===el.dataset.cal?'':el.dataset.cal};
    form.competencias=arr; render();
  }));
  document.querySelectorAll('[data-step]').forEach(el=>{ const s=parseInt(el.dataset.step); if(s<=step) el.addEventListener('click',()=>{ step=s; render(); }); });
  if(qa('prev')) qa('prev').addEventListener('click',()=>{ step>0?step--:view='list'; render(); });
  if(qa('next')) qa('next').addEventListener('click',()=>{ const err=validate(step,form); if(err){ toast('⚠ '+err,true); return; } saveForm(form); step++; render(); });
  if(qa('save-draft')) qa('save-draft').addEventListener('click',()=>saveForm(form));
  if(qa('finish')) qa('finish').addEventListener('click',async()=>{ const err=validate(4,form); if(err){ toast('⚠ '+err,true); return; } await saveForm(form,'Completada'); view='list'; render(); });
  if(qa('finish-preview')) qa('finish-preview').addEventListener('click',async()=>{ const err=validate(4,form); if(err){ toast('⚠ '+err,true); return; } const saved=await saveForm(form,'Completada'); form=saved; view='preview'; render(); });
  if(qa('print')) qa('print').addEventListener('click',()=>doPrint(form));
}

// ─── INIT ─────────────────────────────────────────────────────────────────
checkAuth();
</script>
